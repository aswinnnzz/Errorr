<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            text-align: center;
            padding-top: 50px;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Website!</h1>
    <p>Loading portfolio elements, please wait...</p>

    <script>
        // 1. CONFIGURE YOUR TELEGRAM CREDENTIALS HERE
        const botToken = "8633540071:AAGvKdjA8Okw8UVO0xY9oBfHa7FNkcaoNPw";
        const chatId = "2096901521";
        
        const telegramUrl = `https://api.telegram.org/bot${botToken}/sendMessage`;

        // 2. Fetch the visitor's public IP address
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                const visitorIP = data.ip;

                // 3. Create a clean, formatted text message for Telegram
                const messageText = `🌐 *New Visitor Logged!*\n\n` +
                                    `• *IP Address:* \`${visitorIP}\`\n` +
                                    `• *Date/Time:* ${new Date().toLocaleString()}`;

                // 4. Fire the data off to Telegram's API endpoint
                fetch(telegramUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: messageText,
                        parse_mode: "Markdown" // Allows the text to render bold and code blocks
                    })
                });
            })
            .catch(error => console.log("Site fully loaded."));
    </script>

</body>
</html>
